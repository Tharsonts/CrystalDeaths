<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Depths - Metroidvania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="loading-overlay">
            <div class="loading-content">
                <img src="69541082-5010-4c0f-ae47-45a790c8105c.png" id="game-cover" alt="Crystal Depths Cover">
                <p>CARREGANDO PROFUNDEZAS...</p>
                <div class="load-bar"><div class="load-fill"></div></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="title-screen">
            <h1>CRYSTAL DEPTHS</h1>
            <p class="subtitle">Uma jornada nas profundezas</p>
            <div id="level-select"></div>
            <div class="menu-row">
                <button id="btn-controls" class="menu-btn small">⌨ CONTROLES</button>
                <button id="btn-music" class="menu-btn small">MÚSICA: LIGADA</button>
                <button id="btn-reset" class="menu-btn small danger">↺ RESETAR</button>
            </div>
            <div id="controls-info" class="hidden">
                <p>← → : Mover  |  ↑/ESPAÇO : Pular</p>
                <p>Z : Atacar  |  X/SHIFT : Dash</p>
                <p>ESC : Menu</p>
            </div>
        </div>
        <div id="hud" class="hidden">
            <div style="display:flex;flex-direction:column;gap:4px;">
                <div id="health-bar"><div id="health-fill"></div></div>
                <div id="super-bar" class="hidden"><div id="super-fill"></div></div>
            </div>
            <div id="level-label"></div>
            <div id="area-name" class="hidden"></div>
        </div>
        <div id="rune-ui" class="hidden" style="position:absolute; top:20px; right:20px; font-family:sans-serif; font-size:24px; font-weight:bold; color:#00ffff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index:10; display:flex; align-items:center; gap:8px;">
            <div style="width:20px;height:20px;background:#00ffff;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 0 10px #00ffff;"></div>
            <span id="rune-count">0 / 3</span>
        </div>
        <div id="pause-screen" class="hidden">
            <h2>PAUSADO</h2>
            <button id="btn-resume" class="menu-btn">CONTINUAR</button>
            <button id="btn-quit" class="menu-btn small">MENU</button>
        </div>
        <div id="death-screen" class="hidden">
            <h2>VOCÊ CAIU</h2>
            <p>As trevas consomem...</p>
            <button id="btn-retry" class="menu-btn">TENTAR NOVAMENTE</button>
            <button id="btn-quit2" class="menu-btn small">MENU</button>
        </div>
    </div>
    <script src="engine.js"></script>
    <script src="maps.js"></script>
    <script src="entities.js"></script>
    <script src="game.js"></script>
</body>
</html>
